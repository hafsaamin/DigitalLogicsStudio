        "@type": "WebSite",

        "description": "Interactive digital logic design learning platform covering Boolean algebra, number systems, combinational and sequential circuits, registers, and memory systems.",

          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://circuits.quantumlogicslimited.com/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
